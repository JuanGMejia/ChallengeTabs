<div class="form-container">
  <h3>Create New User</h3>
  <form [formGroup]="userForm" (ngSubmit)="onSubmit()">
    <div class="form-field">
      <label for="name">Name</label>
      <input id="name" type="text" formControlName="name" placeholder="Enter name">
      <div *ngIf="userForm.get('name')?.touched && userForm.get('name')?.invalid" class="error">
        Name is required (min 3 chars).
      </div>
    </div>

    <div class="form-field">
      <label for="email">Email</label>
      <input id="email" type="email" formControlName="email" placeholder="Enter email">
      <div *ngIf="userForm.get('email')?.touched && userForm.get('email')?.invalid" class="error">
        Please enter a valid email.
      </div>
    </div>

    <div class="form-field">
      <label for="role">Role</label>
      <select id="role" formControlName="role">
        <option value="user">User</option>
        <option value="admin">Admin</option>
        <option value="editor">Editor</option>
      </select>
    </div>

    <button type="submit" [disabled]="userForm.invalid" class="submit-btn">
      Create User
    </button>
  </form>
</div>
